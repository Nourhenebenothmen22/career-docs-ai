name: CI/CD Build & Verification

on:
  push:
    branches:
      - '*'
  pull_request:
    branches:
      - main

jobs:
  build-and-verify:
    name: Build & Verify Application
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup Node.js Environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      # 3. Install & Verify Backend
      - name: Install Backend Dependencies
        run: |
          cd backend
          npm ci

      - name: Run Backend Syntax Check
        run: |
          cd backend
          node --check src/index.js

      # 4. Install & Build Frontend
      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci

      - name: Build Frontend Production Bundle
        run: |
          cd frontend
          npm run build

      # 5. Verify Docker Builds
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: risalatech-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Frontend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: risalatech-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
